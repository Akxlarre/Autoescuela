<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Gradiente para el isotipo del vehículo -->
    <linearGradient id="blueCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Gradiente sutil para acentos -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- ISOTIPO: Vehículo Moderno Estilizado en Movimiento -->
    <g transform="translate(0, 0)">
      <!-- Líneas de velocidad / Viento aerodinámico -->
      <path d="M5,55 L45,55" stroke="url(#blueCyanGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4" />
      <path d="M15,35 L35,35" stroke="url(#blueCyanGrad)" stroke-width="3" stroke-linecap="round" opacity="0.3" />
      <path d="M10,75 L50,75" stroke="url(#blueCyanGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5" />
      
      <!-- Chasis y silueta del vehículo -->
      <path d="M50,70 C50,70 65,40 90,38 C115,36 135,36 150,50 C165,52 185,55 195,65 C205,75 200,82 185,82 L65,82 C55,82 50,76 50,70 Z" 
            fill="url(#blueCyanGrad)" />
      
      <!-- Ventanillas (Efecto cristal) -->
      <path d="M93,44 L120,43 L126,56 L93,56 Z" fill="#FFFFFF" opacity="0.9" />
      <path d="M125,43 L145,53 L140,56 L129,56 Z" fill="#FFFFFF" opacity="0.9" />
      
      <!-- Ruedas estilizadas en hueco y cromo -->
      <circle cx="85" cy="82" r="16" fill="#0F172A" />
      <circle cx="85" cy="82" r="10" fill="#F8FAFC" />
      <circle cx="85" cy="82" r="5" fill="url(#blueCyanGrad)" />

      <circle cx="160" cy="82" r="16" fill="#0F172A" />
      <circle cx="160" cy="82" r="10" fill="#F8FAFC" />
      <circle cx="160" cy="82" r="5" fill="url(#blueCyanGrad)" />
      
      <!-- Faro delantero brillante (destello de luz) -->
      <path d="M192,67 L210,69 L194,74 Z" fill="#F59E0B" />
    </g>

    <!-- LOGOTIPO: Texto tipográfico premium -->
    <g transform="translate(225, 0)">
      <!-- Título Principal -->
      <text x="0" y="52" font-family="'Outfit', 'Inter', 'system-ui', sans-serif" font-size="38" font-weight="900" fill="#0F172A" letter-spacing="-1">
        AUTOESCUELA
      </text>
      <!-- Subtítulo de Marca con gradiente -->
      <text x="0" y="86" font-family="'Outfit', 'Inter', 'system-ui', sans-serif" font-size="28" font-weight="700" fill="url(#blueCyanGrad)" letter-spacing="4">
        CHILLÁN
      </text>
    </g>
  </g>
</svg>
