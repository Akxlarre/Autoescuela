<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Autoescuela</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!--
    Fuentes del flujo público de inscripción (spec 0009): Outfit + Inter.
    Solo se aplican donde el scope [data-public-theme] sobreescribe --font-*;
    el resto del app sigue usando Bricolage Grotesque.
  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!--
    Anti-FOWT (Flash of Wrong Theme): aplica el atributo data-mode='dark'
    ANTES de que Angular bootstrappee, eliminando el parpadeo blanco inicial
    cuando el usuario tiene dark mode guardado en localStorage.
    Debe ejecutarse de forma síncrona en <head> para bloquear el primer render.
  -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('app-color-mode');
          var isDark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.setAttribute('data-mode', 'dark');
          }
        } catch (e) {
          // localStorage puede estar bloqueado en modo incógnito estricto
        }
      })();
    </script>
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
