<div class="h-full flex flex-col bg-bg-base overflow-hidden">
  <!-- Header Premium -->
  <header class="bg-surface border-b border-border-subtle p-6 shrink-0 relative z-20 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Tracker de Pasos Horizontal -->
      <div
        class="hidden lg:flex items-center gap-1 bg-bg-base p-1.5 rounded-2xl border border-border-subtle shadow-inner"
      >
        @for (step of [1, 2, 3, 4, 5, 6]; track step) {
          <div class="flex items-center gap-1 group">
            <div
              class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black transition-all cursor-default"
              [class.bg-brand]="activeStep() + 1 >= step"
              [class.text-surface]="activeStep() + 1 >= step"
              [class.bg-surface]="activeStep() + 1 < step"
              [class.text-text-muted]="activeStep() + 1 < step"
              [class.border]="activeStep() + 1 < step"
              [class.border-border-default]="activeStep() + 1 < step"
            >
              {{ step }}
            </div>
            @if (step < 6) {
              <div
                class="w-4 h-0.5 rounded-full transition-colors"
                [class.bg-brand]="activeStep() + 1 > step"
                [class.bg-border-subtle]="activeStep() + 1 <= step"
              ></div>
            }
          </div>
        }
      </div>

      <div class="flex items-center gap-3">
        <span
          class="text-xs font-bold text-text-muted px-3 py-1 bg-bg-base rounded-lg border border-border-subtle"
        >
          Paso {{ activeStep() + 1 }} de 6
        </span>
      </div>
    </div>
  </header>

  <!-- DEV MOCK — eliminar cuando haya datos reales en la BD -->
  @if (isDevMode) {
    <div
      class="flex flex-wrap items-center gap-2 px-4 py-3 bg-state-warning-bg border-b border-state-warning-border"
      role="group"
      aria-label="Modo desarrollo: saltar a paso"
    >
      <div class="flex items-center gap-2 shrink-0">
        <app-icon name="flask-conical" [size]="14" class="text-state-warning" aria-hidden="true" />
        <span class="text-xs font-bold text-state-warning">Ir al paso:</span>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        @for (step of [1, 2, 3, 4, 5, 6]; track step) {
          <button
            type="button"
            (click)="devGoToStep(step)"
            [attr.aria-current]="activeStep() + 1 === step ? 'step' : null"
            [attr.aria-label]="'Paso ' + step"
            class="min-w-[2.25rem] h-9 px-3 rounded-xl text-sm font-bold transition-all cursor-pointer select-none border-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-state-warning focus-visible:ring-offset-2 hover:opacity-90 active:scale-[0.98]"
            [class.bg-state-warning]="activeStep() + 1 === step"
            [class.text-surface]="activeStep() + 1 === step"
            [class.border-state-warning-border]="activeStep() + 1 === step"
            [class.bg-surface]="activeStep() + 1 !== step"
            [class.text-text-primary]="activeStep() + 1 !== step"
            [class.border-border-default]="activeStep() + 1 !== step"
            [class.hover:bg-bg-subtle]="activeStep() + 1 !== step"
            [class.hover:border-state-warning-border]="activeStep() + 1 !== step"
          >
            {{ step }}
          </button>
        }
      </div>
    </div>
  }

  <!-- Contenido del Wizard -->
  <main class="flex-1 overflow-y-auto overflow-x-hidden relative scrollbar-thin">
    @if (isSaving()) {
      <div class="h-0.5 bg-brand animate-pulse w-full sticky top-0 z-10"></div>
    }
    @if (enrollment.error()) {
      <div
        class="bg-state-error-bg border-b border-state-error-border px-6 py-3 flex items-center gap-3 sticky top-0 z-10"
      >
        <app-icon name="alert-circle" [size]="16" class="text-state-error shrink-0" />
        <p class="text-sm text-state-error font-medium flex-1">{{ enrollment.error() }}</p>
      </div>
    }
    <div class="max-w-7xl mx-auto p-6 min-h-full flex flex-col">
      <p-stepper
        [value]="activeStep()"
        (valueChange)="onStepperChange($event)"
        [class]="stepperClass()"
      >
        <p-step-panels class="p-0">
          <p-step-panel [value]="0">
            <ng-template #content>
              <app-personal-data-step
                [data]="step1Data()"
                (dataChange)="onStep1DataChange($event)"
                (next)="onStep1Next()"
                (cancel)="finishWizard()"
              >
              </app-personal-data-step>
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="1">
            <ng-template #content>
              <app-assignment-step
                [data]="step2Data()"
                (dataChange)="onStep2DataChange($event)"
                (next)="onStep2Next()"
                (back)="enrollment.goBack()"
              >
              </app-assignment-step>
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="2">
            <ng-template #content>
              <app-documents-step
                [data]="step3Data()"
                (fileSelected)="onDocFileSelected($event)"
                (next)="onStep3Next()"
                (back)="enrollment.goBack()"
              >
              </app-documents-step>
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="3">
            <ng-template #content>
              <app-payment-step
                [data]="step4Data()"
                (dataChange)="onStep4DataChange($event)"
                (next)="onStep4Next()"
                (back)="enrollment.goBack()"
              >
              </app-payment-step>
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="4">
            <ng-template #content>
              <app-contract-step
                [data]="step5Data()"
                (dataChange)="onStep5DataChange($event)"
                (generateContract)="onGenerateContract()"
                (next)="onStep5Next()"
                (back)="enrollment.goBack()"
              >
              </app-contract-step>
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="5">
            <ng-template #content>
              <app-confirmation-step
                [data]="step6Data()"
                (finish)="finishWizard()"
                (downloadReceipt)="onDownloadReceipt()"
                (downloadContract)="onDownloadContract()"
              ></app-confirmation-step>
            </ng-template>
          </p-step-panel>
        </p-step-panels>
      </p-stepper>
    </div>
  </main>
</div>
