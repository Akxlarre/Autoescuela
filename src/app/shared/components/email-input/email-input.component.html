<div class="flex flex-col gap-1.5">
  <label class="text-xs font-semibold" style="color: var(--text-secondary)" [for]="id()">
    {{ label() }}
    @if (required()) {
      <span style="color: var(--state-error)">*</span>
    }
  </label>

  <input
    [id]="id()"
    [name]="id()"
    [attr.name]="id()"
    type="email"
    [ngModel]="value()"
    (ngModelChange)="valueChange.emit($event)"
    (change)="valueChange.emit($any($event.target).value)"
    (blur)="onBlur($any($event.target).value)"
    [placeholder]="placeholder()"
    autocomplete="email"
    data-llm-description="Email address input field with real-time format validation"
    class="w-full h-11 px-4 text-sm border rounded-xl focus:ring-2 focus:ring-brand/20 focus:border-brand outline-none transition-all"
    style="background: var(--bg-surface); color: var(--text-primary)"
    [class.border-state-error]="showFeedback() && !isValid()"
    [class.border-border-default]="!showFeedback() || isValid()"
    [attr.aria-required]="required()"
    [attr.aria-invalid]="showFeedback() && !isValid()"
    [attr.aria-describedby]="id() + '-feedback'"
  />

  @if (showFeedback() && !isValid()) {
    <p [id]="id() + '-feedback'" class="text-xs text-state-error flex items-center gap-1">
      <app-icon name="circle-alert" [size]="12" />
      Correo inválido — verifica que tenga el formato correcto (ej: usuario&#64;dominio.cl)
    </p>
  } @else if (showFeedback() && isValid()) {
    <p [id]="id() + '-feedback'" class="text-xs text-state-success flex items-center gap-1">
      <app-icon name="check-circle" [size]="12" />
      Correo válido
    </p>
  } @else {
    <p [id]="id() + '-feedback'" class="text-xs italic" style="color: var(--text-muted)">
      Formato: usuario&#64;dominio.cl
    </p>
  }
</div>
