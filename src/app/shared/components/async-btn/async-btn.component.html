<button
  type="button"
  [disabled]="isDisabledOrLoading()"
  class="cursor-pointer px-8 py-2.5 bg-text-primary text-surface text-sm font-semibold rounded-lg hover:opacity-90 shadow-sm active:scale-95 transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
>
  @if (loading()) {
    <app-icon name="loader" [size]="14" class="animate-spin" aria-hidden="true" />
    <span>{{ loadingLabel() }}</span>
  } @else {
    <span>{{ label() }}</span>
    @if (icon()) {
      <app-icon [name]="icon()!" [size]="14" />
    }
  }
</button>
